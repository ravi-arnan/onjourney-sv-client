# Dependabot version updates — npm (supports package.json + bun.lock)
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Jakarta"
    # bun.lock + package.json; CI should run bun install && bun run check
    open-pull-requests-limit: 15
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
    # Batch minor + patch into fewer PRs; majors stay separate for review
    groups:
      npm-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Optional: ignore noisy or breaking majors until manually bumped
    # ignore:
    #   - dependency-name: "svelte"
    #     update-types: ["version-update:semver-major"]
