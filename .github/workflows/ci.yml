# Verifikasi kode pada jalur staging dan main (lihat docs/pipeline-staging-main.md)
name: CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:unit -- --run
