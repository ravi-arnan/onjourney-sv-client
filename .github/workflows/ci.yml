# Verifikasi kode pada jalur staging dan main (lihat docs/pipeline-staging-main.md)
name: CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          # Pin agar bun.lock tidak bergeser antar patch CI vs lokal
          bun-version: '1.3.12'

      - name: Install
        # --ignore-scripts: hindari `prepare` (playwright download) di CI; `check` menjalankan svelte-kit sync
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Check
        run: bun run check

      - name: Lint
        run: bun run lint

      # Vitest `client` project uses @vitest/browser-playwright; install is skipped via --ignore-scripts.
      # Use `bun run …` (not `bun exec playwright`): Bun does not resolve the playwright bin that way.
      - name: Playwright (Chromium for Vitest browser tests)
        run: bun run playwright:install-chromium

      - name: Unit tests
        run: bun run test:unit -- --run
